<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Hisaab-Kitaab | Travel Planning</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="app.css" />
</head>
<body class="travel-page">
	<div class="grain"></div>
	<div class="bg-shape shape-a"></div>
	<div class="bg-shape shape-b"></div>
	<div class="bg-stripes"></div>

	<header class="site-header panel reveal">
		<div class="brand-wrap">
			<p class="kicker">Trip organization board</p>
			<h1 class="brand">Travel Planning</h1>
		</div>
		<div class="header-actions">
			<a class="btn btn-ghost planner-link" href="app.html">Back to Expense Tracker</a>
		</div>
	</header>

	<main class="layout">
		<section class="panel reveal">
			<h2>Trip Blueprint</h2>
			<p class="planner-note">Plan your journey in three sections: Travel, Food, and Stay.</p>
			<div class="planner-grid">
				<article class="planner-card">
					<h3>Travel</h3>
					<input id="travelDestination" type="text" placeholder="Destination and dates" />
					<textarea id="travelNotes" rows="6" placeholder="Transport mode, tickets, must-visit places..."></textarea>
				</article>
				<article class="planner-card">
					<h3>Food</h3>
					<input id="foodBudget" type="number" min="0" step="1" placeholder="Food budget (INR)" />
					<textarea id="foodNotes" rows="6" placeholder="Restaurants, local dishes, meal schedule..."></textarea>
				</article>
				<article class="planner-card">
					<h3>Stay</h3>
					<input id="stayBudget" type="number" min="0" step="1" placeholder="Stay budget (INR)" />
					<textarea id="stayNotes" rows="6" placeholder="Hotel details, check-in plan, nearby spots..."></textarea>
				</article>
			</div>
			<div class="planner-actions">
				<button id="clearPlanner" type="button" class="btn btn-ghost">Clear Plan</button>
				<button id="savePlanner" type="button" class="btn btn-primary">Save Plan</button>
			</div>

			<div class="travel-expenses">
				<h2>Integrated Travel Expense Tracker</h2>
				<form id="travelExpenseForm" class="travel-expense-form">
					<label>
						Amount (INR)
						<input id="travelAmount" type="number" min="0.01" step="0.01" required />
					</label>
					<label>
						Category
						<select id="travelCategory" required>
							<option value="">Choose</option>
							<option>Travel</option>
							<option>Food</option>
							<option>Stay</option>
						</select>
					</label>
					<label>
						Date
						<input id="travelDate" type="date" required />
					</label>
					<label>
						Note
						<input id="travelNote" type="text" maxlength="80" placeholder="Cab, meal, hotel..." />
					</label>
					<button type="submit" class="btn btn-primary">Add Expense</button>
				</form>

				<div class="travel-expense-summary">
					<div>
						<p>Total Planned + Logged Spend</p>
						<strong id="travelExpenseTotal" class="travel-expense-total">₹0.00</strong>
					</div>
					<button id="clearTravelExpenses" type="button" class="btn btn-ghost">Clear Expenses</button>
				</div>

				<ul id="travelExpenseList" class="travel-expense-list"></ul>
			</div>
		</section>
	</main>

	<div class="toast" id="toast">Plan saved</div>
	<script src="travel-planner.js"></script>
</body>
</html>
